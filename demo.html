<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NitroCommerce — <span id="tab-site">localhost</span></title>

  <script type="text/javascript" src="/id-generator.js"></script>

  <style>
    :root {
      --bg: #07070b;
      --card: #14141f;
      --card-border: #2a2a3d;
      --pill-bg: #1d1d33;
      --pill-border: #3a3a63;
      --accent: #8b7bff;
      --accent2: #b06cff;
      --muted: #8a8aa3;
      --id-green: #44e08b;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: #e7e7f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .card {
      width: 100%; max-width: 620px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 34px 32px 30px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    h1 {
      margin: 0 0 18px; text-align: center;
      font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .rocket { -webkit-text-fill-color: initial; }
    .pill {
      display: block; width: fit-content; margin: 0 auto 14px;
      background: var(--pill-bg); border: 1px solid var(--pill-border);
      color: #c9c4ff; font-size: 14px; font-weight: 600;
      padding: 7px 16px; border-radius: 999px;
    }
    .pill b { color: #fff; }
    .hint { text-align: center; color: var(--muted); font-size: 14px; margin: 0 0 18px; }
    .idbox {
      background: #050507; border: 1px solid #1c1c2b; border-radius: 12px;
      min-height: 64px; display: flex; align-items: center; justify-content: center;
      padding: 18px 20px; margin-bottom: 22px;
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
      font-size: 15px; color: var(--id-green); font-weight: 700;
      word-break: break-all; text-align: center; line-height: 1.5;
      transition: color .2s;
    }
    .idbox.loading { color: var(--id-green); opacity: .7; }
    .idbox.error { color: #ff6b6b; }
    .btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    button {
      background: var(--pill-bg); border: 1px solid var(--pill-border);
      color: #cfc9ff; font-size: 14px; font-weight: 600;
      padding: 9px 16px; border-radius: 10px; cursor: pointer;
      transition: all .15s;
    }
    button:hover { background: #28284a; border-color: var(--accent); color: #fff; }
    button:active { transform: translateY(1px); }
    button.active { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #fff; border-color: transparent; }
    button.clear { color: #ff8b8b; border-color: #5a2a3a; }
    button.clear:hover { background: #3a1f29; color: #fff; }
    .foot { text-align: center; color: #55556b; font-size: 12px; margin-top: 18px; }
    .same-tag {
      display: inline-block; margin-left: 8px; font-size: 12px; font-weight: 700;
      color: #0b0b12; background: var(--id-green); padding: 2px 8px; border-radius: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="rocket">🚀</span> NitroCommerce Tracker</h1>
    <span class="pill">Simulating: <b id="site-name">localhost</b></span>
    <p class="hint">Check console for ID.</p>

    <div id="idbox" class="idbox loading">Acquiring ID…</div>

    <div class="btns">
      <button data-site="shop.com">shop.com</button>
      <button data-site="crow.com">crow.com</button>
      <button data-site="pewpie.com">pewpie.com</button>
      <button data-site="Registry">Registry</button>
      <button class="clear" id="clear-btn">Clear</button>
    </div>

    <p class="foot" id="foot">Same browser → same ID across every "site", with no cookies.</p>
  </div>

  <script>
  (function () {
    var idbox    = document.getElementById('idbox');
    var siteName = document.getElementById('site-name');
    var tabSite  = document.getElementById('tab-site');
    var foot     = document.getElementById('foot');
    var btns     = document.querySelectorAll('button[data-site]');

    // ---- Canvas Checksum ko UI aur Console dono jagah bhejne ka function ----
    function displayChecksum() {
      idbox.classList.remove('loading', 'error');

      var id = window.canvasChecksum;

      if (id) {
        // 1. Box me display karo
        idbox.innerHTML = id + ' <span class="same-tag">LOCAL ✓</span>';
        foot.textContent = '✓ Identical ID returned — hardware consistency works perfectly.';

        // 2. Console me print karo jaisa aapne pucha tha
        console.log("Current Active Canvas ID:", id);
      } else {
        idbox.classList.add('error');
        idbox.textContent = 'Error: Canvas not found.';
      }
    }

    function setActive(site) {
      btns.forEach(function (b) { b.classList.toggle('active', b.dataset.site === site); });
    }

    function showLoading() {
      idbox.classList.remove('error'); idbox.classList.add('loading');
      idbox.textContent = 'Acquiring ID…';
    }

    function visitSite(site) {
      setActive(site);
      siteName.textContent = site;
      tabSite.textContent = site;
      document.title = 'NitroCommerce — ' + site;
      showLoading();

      // Fake delay simulate karne ke liye jab button click ho
      setTimeout(function () {
        displayChecksum();
      }, 300);
    }

    // Page load hote hi first time check run karein
    displayChecksum();

    // Event listeners for buttons
    btns.forEach(function (b) {
      b.addEventListener('click', function () { visitSite(b.dataset.site); });
    });

    document.getElementById('clear-btn').addEventListener('click', function () {
      setActive(null);
      siteName.textContent = 'localhost';
      tabSite.textContent = 'localhost';
      document.title = 'NitroCommerce — localhost';
      showLoading();
      setTimeout(function () {
        displayChecksum();
      }, 300);
    });
  })();
  </script>
</body>
</html>
